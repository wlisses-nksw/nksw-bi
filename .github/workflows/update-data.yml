name: Atualizar Dados do Dashboard

on:
  schedule:
    - cron: '*/15 * * * *'   # A cada 15 minutos
  workflow_dispatch:           # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositГіrio
        uses: actions/checkout@v4

      - name: Definir perГ­odo atual
        run: |
          echo "START=$(date -u +%Y-%m-01)"        >> $GITHUB_ENV
          echo "END=$(date -u +%Y-%m-%d)"           >> $GITHUB_ENV
          echo "TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      # в”Ђв”Ђ GA4 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Buscar dados GA4
        run: |
          curl -sL "${{ secrets.GA4_URL }}?period=custom&startDate=${START}&endDate=${END}" \
            -o /tmp/ga4.json --max-time 30 || echo '{}' > /tmp/ga4.json

          if jq -e '.overview' /tmp/ga4.json > /dev/null 2>&1; then
            jq --arg ts "$TS" --arg s "$START" --arg e "$END" \
              '. + {"generated_at":$ts,"period":{"start":$s,"end":$e}}' \
              /tmp/ga4.json > data/ga4.json
            echo "вњ… GA4 atualizado"
          else
            echo "вљ пёЏ Resposta GA4 invГЎlida вЂ” mantendo arquivo existente"
            cat /tmp/ga4.json
          fi

      # в”Ђв”Ђ SHEETS вЂ” cada seГ§ГЈo separada в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Buscar dados Vendas
        run: |
          curl -sL "${{ secrets.SHEETS_URL }}?section=vendas&period=custom&startDate=${START}&endDate=${END}" \
            -o /tmp/vendas.json --max-time 30 || echo '{"ok":false}' > /tmp/vendas.json

          if jq -e '.ok' /tmp/vendas.json > /dev/null 2>&1; then
            jq --arg ts "$TS" --arg s "$START" --arg e "$END" \
              '. + {"generated_at":$ts,"period":{"start":$s,"end":$e}}' \
              /tmp/vendas.json > data/vendas.json
            echo "вњ… Vendas atualizado"
          else
            echo "вљ пёЏ Vendas invГЎlido вЂ” mantendo arquivo existente"
          fi

      - name: Buscar dados Pedidos
        run: |
          curl -sL "${{ secrets.SHEETS_URL }}?section=pedidos&period=custom&startDate=${START}&endDate=${END}" \
            -o /tmp/pedidos.json --max-time 30 || echo '{"ok":false}' > /tmp/pedidos.json

          if jq -e '.ok' /tmp/pedidos.json > /dev/null 2>&1; then
            jq --arg ts "$TS" --arg s "$START" --arg e "$END" \
              '. + {"generated_at":$ts,"period":{"start":$s,"end":$e}}' \
              /tmp/pedidos.json > data/pedidos.json
            echo "вњ… Pedidos atualizado"
          else
            echo "вљ пёЏ Pedidos invГЎlido вЂ” mantendo arquivo existente"
          fi

      - name: Buscar dados Clientes
        run: |
          curl -sL "${{ secrets.SHEETS_URL }}?section=clientes&cohortMonths=24&period=custom&startDate=${START}&endDate=${END}" \
            -o /tmp/clientes.json --max-time 30 || echo '{"ok":false}' > /tmp/clientes.json

          if jq -e '.ok' /tmp/clientes.json > /dev/null 2>&1; then
            jq --arg ts "$TS" --arg s "$START" --arg e "$END" \
              '. + {"generated_at":$ts,"period":{"start":$s,"end":$e}}' \
              /tmp/clientes.json > data/clientes.json
            echo "вњ… Clientes atualizado"
          else
            echo "вљ пёЏ Clientes invГЎlido вЂ” mantendo arquivo existente"
          fi

      - name: Buscar dados LogГ­stica
        run: |
          curl -sL "${{ secrets.SHEETS_URL }}?section=logistica&period=custom&startDate=${START}&endDate=${END}" \
            -o /tmp/logistica.json --max-time 30 || echo '{"ok":false}' > /tmp/logistica.json

          if jq -e '.ok' /tmp/logistica.json > /dev/null 2>&1; then
            jq --arg ts "$TS" --arg s "$START" --arg e "$END" \
              '. + {"generated_at":$ts,"period":{"start":$s,"end":$e}}' \
              /tmp/logistica.json > data/logistica.json
            echo "вњ… LogГ­stica atualizado"
          else
            echo "вљ пёЏ LogГ­stica invГЎlido вЂ” mantendo arquivo existente"
          fi

      - name: Buscar dados Estoque
        run: |
          curl -sL "${{ secrets.SHEETS_URL }}?section=estoque" \
            -o /tmp/estoque.json --max-time 60 || echo '{"ok":false}' > /tmp/estoque.json

          if jq -e '.ok' /tmp/estoque.json > /dev/null 2>&1; then
            jq --arg ts "$TS" \
              '. + {"generated_at":$ts}' \
              /tmp/estoque.json > data/estoque.json
            echo "вњ… Estoque atualizado"
          else
            echo "вљ пёЏ Estoque invГЎlido вЂ” mantendo arquivo existente"
            cat /tmp/estoque.json
          fi

      - name: Buscar dados Produtos
        run: |
          curl -sL "${{ secrets.SHEETS_URL }}?section=produtos&period=custom&startDate=${START}&endDate=${END}" \
            -o /tmp/produtos.json --max-time 30 || echo '{"ok":false}' > /tmp/produtos.json

          if jq -e '.ok' /tmp/produtos.json > /dev/null 2>&1; then
            jq --arg ts "$TS" --arg s "$START" --arg e "$END" \
              '. + {"generated_at":$ts,"period":{"start":$s,"end":$e}}' \
              /tmp/produtos.json > data/produtos.json
            echo "вњ… Produtos atualizado"
          else
            echo "вљ пёЏ Produtos invГЎlido вЂ” mantendo arquivo existente"
          fi

      # в”Ђв”Ђ Arquivos histГіricos por mГЄs (sГі gera se ainda nГЈo existir) в”Ђв”Ђв”Ђв”Ђ
      - name: Gerar dados histГіricos por mГЄs
        run: |
          for i in 1 2 3 4 5 6; do
            KEY=$(date -u -d "${i} months ago" +%Y-%m)
            S=$(date -u -d "${i} months ago" +%Y-%m-01)
            E=$(date -u -d "$(date -u -d "${i} months ago" +%Y-%m-01) +1 month -1 day" +%Y-%m-%d)

            for section in vendas pedidos clientes logistica; do
              FILE="data/${section}_${KEY}.json"
              # Pula se arquivo jГЎ existe e estГЎ OK
              if [ -f "$FILE" ] && jq -e '.ok' "$FILE" > /dev/null 2>&1; then
                echo "вЏ­пёЏ  ${section} ${KEY} jГЎ existe"
                continue
              fi

              EXTRA=""
              [ "$section" = "clientes" ] && EXTRA="&cohortMonths=24"

              curl -sL "${{ secrets.SHEETS_URL }}?section=${section}&period=custom&startDate=${S}&endDate=${E}${EXTRA}" \
                -o /tmp/${section}_${KEY}.json --max-time 60 || continue

              if jq -e '.ok' /tmp/${section}_${KEY}.json > /dev/null 2>&1; then
                jq --arg ts "$TS" --arg s "$S" --arg e "$E" \
                  '. + {"generated_at":$ts,"period":{"start":$s,"end":$e}}' \
                  /tmp/${section}_${KEY}.json > "$FILE"
                echo "вњ… ${section} ${KEY}"
              else
                echo "вљ пёЏ  ${section} ${KEY} falhou"
              fi
            done
          done

      # в”Ђв”Ђ Commit e push в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Salvar alteraГ§Гµes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet \
            && echo "Sem alteraГ§Гµes nos dados." \
            || (git commit -m "data: atualizar $(date -u +'%Y-%m-%d %H:%M') UTC" && git push)
